name: Multi-language Build with RCA
 
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node.js
        id: detect_node
        run: |
          if [ -f "package.json" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.detect_node.outputs.detected == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node dependencies
        if: steps.detect_node.outputs.detected == 'true'
        run: npm install

      - name: Run Node tests
        if: steps.detect_node.outputs.detected == 'true'
        run: npm test > logs.txt 2>&1 || true

      - name: Detect Python
        id: detect_python
        run: |
          if [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.detect_python.outputs.detected == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        if: steps.detect_python.outputs.detected == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          pip install pytest

      - name: Run Python tests
        if: steps.detect_python.outputs.detected == 'true'
        run: pytest -v > logs.txt 2>&1 || true

      - name: Detect Maven
        id: detect_maven
        run: |
          if [ -f "pom.xml" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        if: steps.detect_maven.outputs.detected == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Maven tests
        if: steps.detect_maven.outputs.detected == 'true'
        run: mvn clean test > logs.txt 2>&1 || true

      - name: Detect Go
        id: detect_go
        run: |
          if [ -f "go.mod" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        if: steps.detect_go.outputs.detected == 'true'
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Go tests
        if: steps.detect_go.outputs.detected == 'true'
        run: go test ./... > logs.txt 2>&1 || true

      - name: Fallback if no detected build
        if: ${{ always() }}
        run: |
          if [ ! -f "logs.txt" ]; then
            echo "No recognized build system found (package.json, requirements.txt, pom.xml, go.mod)" > logs.txt
          fi

      - name: Save failure context
        if: failure()
        run: |
          echo "---" >> logs.txt
          echo "Build failed at: $(date)" >> logs.txt
          echo "Workflow: ${{ github.workflow }}" >> logs.txt

  rca-analysis:
    needs: build
    if: failure()
    uses: itsmeteja9/Agent-POC/.github/workflows/rca-reusable.yml@main
    with:
      tool_repo: itsmeteja9/Agent-POC
      log_file: logs.txt
      artifact_name: rca-report
      python_version: "3.10"
